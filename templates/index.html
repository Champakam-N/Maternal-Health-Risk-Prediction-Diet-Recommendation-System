<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MamaCare</title>
    
    <!-- Add Poppins font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #5a3d5c;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background elements */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 175, 204, 0.1), rgba(255, 200, 221, 0.05));
        }

        .decoration-1 {
            top: 10%;
            left: 10%;
            width: 120px;
            height: 120px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }

        .decoration-2 {
            bottom: 10%;
            right: 10%;
            width: 150px;
            height: 150px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        .decoration-3 {
            top: 50%;
            left: 5%;
            width: 80px;
            height: 80px;
            border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.15);
            border: 1px solid #ffd6e0;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffafcc, #ffc8dd, #ffafcc);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            color: #d46a8c;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            margin-top: 8px;
            border-radius: 12px;
            border: 2px solid #ffd6e0;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #5a3d5c;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #ffafcc;
            box-shadow: 0 0 0 3px rgba(255, 175, 204, 0.2);
            background: white;
        }

        input::placeholder {
            color: #c9a9b5;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffafcc 0%, #ffc8dd 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #ffc8dd 0%, #ffafcc 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 175, 204, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            background: linear-gradient(135deg, #ffd6e0 0%, #ffafcc 100%);
            color: #9d4b6b;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 20px;
            border: 1px solid #ffafcc;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255, 175, 204, 0.2);
        }

        .link {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            color: #7a5a7b;
            padding-top: 25px;
            border-top: 1px solid #ffd6e0;
        }

        .link a {
            text-decoration: none;
            color: #ff6b94;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .link a:hover {
            color: #d46a8c;
            background: #fff5f7;
        }

        .brand-title {
            text-align: center;
            font-size: 18px;
            color: #d46a8c;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box {
            animation: fadeIn 0.6s ease-out;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                padding: 35px 25px;
                margin: 20px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            input {
                padding: 14px 16px;
            }
            
            button {
                padding: 14px;
            }
            
            .decoration-1,
            .decoration-2,
            .decoration-3 {
                display: none;
            }
        }

        /* Label styling for better accessibility */
        label {
            display: block;
            margin-top: 20px;
            font-size: 15px;
            color: #7a5a7b;
            font-weight: 500;
        }
    </style>
</head>

<body>

<!-- Decorative background elements -->
<div class="decoration decoration-1"></div>
<div class="decoration decoration-2"></div>
<div class="decoration decoration-3"></div>

<div class="login-box">
    <div class="brand-title">MamaCare</div>
    <h2>Maternal Health Risk Assessment</h2>

    <form method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <p class="link">
        New user?
        <a href="/register">Create account</a>
    </p>
</div>

</body>
</html>
