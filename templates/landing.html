<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MamaCare | Maternal Health</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Add Poppins font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            color: #5a3d5c;
            min-height: 100vh;
        }

        /* Center branding */
        .center-title {
            text-align: center;
            padding: 50px 20px 30px;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px 20px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.1);
            border: 1px solid #ffd6e0;
            backdrop-filter: blur(10px);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            overflow: hidden;
        }

        .center-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffafcc, #ffc8dd, #ffafcc);
        }

        .center-title h1 {
            margin: 0;
            font-size: 42px;
            font-weight: 700;
            color: #d46a8c;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(212, 106, 140, 0.1);
        }

        .center-title p {
            margin-top: 12px;
            font-size: 16px;
            color: #7a5a7b;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Layout */
        .container {
            max-width: 900px;
            margin: 30px auto;
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.15);
            overflow: hidden;
            border: 1px solid #ffd6e0;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffafcc, #ffc8dd, #ffafcc);
        }

        .left {
            width: 50%;
            background: #fff5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.2);
        }

        .right {
            width: 50%;
            padding: 50px 45px;
        }

        .right h2 {
            margin-bottom: 30px;
            font-weight: 600;
            color: #d46a8c;
            font-size: 28px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 20px;
            font-size: 15px;
            color: #7a5a7b;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            margin-top: 8px;
            border-radius: 12px;
            border: 2px solid #ffd6e0;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #5a3d5c;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #ffafcc;
            box-shadow: 0 0 0 3px rgba(255, 175, 204, 0.2);
            background: white;
        }

        input::placeholder {
            color: #c9a9b5;
        }

        .primary-btn {
            width: 100%;
            margin-top: 32px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffafcc 0%, #ffc8dd 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.3);
        }

        .primary-btn:hover {
            background: linear-gradient(135deg, #ffc8dd 0%, #ffafcc 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 175, 204, 0.4);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .error {
            background: linear-gradient(135deg, #ffd6e0 0%, #ffafcc 100%);
            color: #9d4b6b;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #ffafcc;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255, 175, 204, 0.2);
        }

        .link {
            margin-top: 28px;
            font-size: 15px;
            text-align: center;
            color: #7a5a7b;
            padding-top: 25px;
            border-top: 1px solid #ffd6e0;
        }

        .link a {
            text-decoration: none;
            color: #ff6b94;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .link a:hover {
            color: #d46a8c;
            background: #fff5f7;
        }

        /* Decorative elements */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }

        .decoration-1 {
            top: 10%;
            left: 5%;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 175, 204, 0.1), rgba(255, 200, 221, 0.05));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        .decoration-2 {
            bottom: 10%;
            right: 5%;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(255, 200, 221, 0.1), rgba(255, 175, 204, 0.05));
            border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                margin: 20px;
            }

            .left {
                height: 250px;
                width: 100%;
                padding: 15px;
            }

            .left img {
                border-radius: 10px;
            }

            .right {
                width: 100%;
                padding: 35px 25px;
            }

            .center-title {
                margin: 20px;
                padding: 40px 20px 25px;
            }

            .center-title h1 {
                font-size: 34px;
            }

            .right h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.6s ease-out;
        }

        .center-title {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>

<body>

<!-- Decorative background elements -->
<div class="decoration decoration-1"></div>
<div class="decoration decoration-2"></div>

<!-- BRAND -->
<div class="center-title">
    <h1>MamaCare</h1>
    <p>Maternal Health Risk Assessment System</p>
</div>

<!-- LOGIN -->
<div class="container">

    <div class="left">
        <img src="{{ url_for('static', filename='images/baby.jpg') }}" alt="Maternal Care">
    </div>

    <div class="right">
        <h2>Welcome Back</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">

            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter your password">

            <button type="submit" class="primary-btn">Login</button>
        </form>

        <p class="link">
            New to MamaCare?
            <a href="/register">Create account</a>
        </p>
    </div>

</div>

</body>
</html>
